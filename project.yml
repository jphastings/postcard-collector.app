name: Postcards
options:
  bundleIdPrefix: org.dotpostcard.collector
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: true
    ENABLE_USER_SCRIPT_SANDBOXING: true
    FRAMEWORK_SEARCH_PATHS:
      - "$(PROJECT_DIR)/Frameworks"

targets:
  Postcards-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Postcards
        excludes:
          - "Fixtures/**"
      - path: Postcards/Fixtures
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - framework: Frameworks/Postcards.xcframework
        embed: true
        codeSign: true

  Postcards-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Postcards
        excludes:
          - "Fixtures/**"
      - path: Postcards/Fixtures
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector.mac
      INFOPLIST_KEY_NSHumanReadableCopyright: ""
      COMBINE_HIDPI_IMAGES: true
      ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - framework: Frameworks/Postcards.xcframework
        embed: true
        codeSign: true

  PostcardsTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Postcards/Core
      - path: PostcardsTests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector.tests
      GENERATE_INFOPLIST_FILE: true
    dependencies:
      - framework: Frameworks/Postcards.xcframework
        embed: false
        codeSign: false

schemes:
  Postcards-iOS:
    build:
      targets:
        Postcards-iOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PostcardsTests
  Postcards-macOS:
    build:
      targets:
        Postcards-macOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PostcardsTests
  PostcardsTests:
    build:
      targets:
        PostcardsTests: all
    test:
      config: Debug
      targets:
        - PostcardsTests
