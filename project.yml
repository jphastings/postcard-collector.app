name: Postcards
options:
  bundleIdPrefix: org.dotpostcard.collector
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: true
    ENABLE_USER_SCRIPT_SANDBOXING: true
    FRAMEWORK_SEARCH_PATHS:
      - "$(PROJECT_DIR)/Frameworks"
    DEVELOPMENT_TEAM: 7L3537S658

# The Postcard Collection format uses the single-segment ".postcards" extension, so it can
# be declared as a proper exported UTI (the app owns the type, giving a default handler,
# icon, and Files/iCloud association) instead of the previous compound-extension workaround.
#
# Both platforms share one ubiquity container (iCloud.org.dotpostcard.collector) so a
# collection dropped into Files/iCloud Drive on either platform syncs to the other.
# NSUbiquitousContainerIsDocumentScopePublic + SupportedFolderLevels=Any is what makes the
# "Postcards" folder show up under iCloud Drive in Files.app/Finder at all.
targetTemplates:
  PostcardApp:
    entitlements:
      path: Postcards/Support/Postcards.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.org.dotpostcard.collector
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.org.dotpostcard.collector
    info:
      path: Postcards/Support/Info-${target_name}.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: Postcard Collection
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - org.dotpostcard.postcards
          - CFBundleTypeName: Postcard Image
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.jpeg
              - public.png
              - org.webmproject.webp
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: org.dotpostcard.postcards
            UTTypeDescription: Postcard Collection
            UTTypeConformsTo:
              - public.database
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - postcards
        NSUbiquitousContainers:
          iCloud.org.dotpostcard.collector:
            NSUbiquitousContainerName: Postcards
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerSupportedFolderLevels: Any

targets:
  Postcards-iOS:
    templates: [PostcardApp]
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Postcards
        excludes:
          - "Support/**"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - framework: Frameworks/Postcards.xcframework
        embed: true
        codeSign: true

  Postcards-macOS:
    templates: [PostcardApp]
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Postcards
        excludes:
          - "Support/**"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector.mac
      INFOPLIST_KEY_NSHumanReadableCopyright: ""
      COMBINE_HIDPI_IMAGES: true
      ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - framework: Frameworks/Postcards.xcframework
        embed: true
        codeSign: true

  PostcardsTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Postcards/Core
      - path: Postcards/Motion
      - path: PostcardsTests
        excludes:
          - "Resources/**"
      - path: PostcardsTests/Resources
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector.tests
      GENERATE_INFOPLIST_FILE: true
    dependencies:
      - framework: Frameworks/Postcards.xcframework
        embed: true
        codeSign: true

  PostcardsUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PostcardsUITests
        excludes:
          - "Resources/**"
      - path: PostcardsUITests/Resources
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector.uitests
      TEST_TARGET_NAME: Postcards-iOS
    dependencies:
      - target: Postcards-iOS

schemes:
  Postcards-iOS:
    build:
      targets:
        Postcards-iOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PostcardsUITests
  Postcards-macOS:
    build:
      targets:
        Postcards-macOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PostcardsTests
  PostcardsTests:
    build:
      targets:
        PostcardsTests: all
    test:
      config: Debug
      targets:
        - PostcardsTests
