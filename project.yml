name: Postcards
options:
  bundleIdPrefix: org.dotpostcard.collector
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.5.9"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: true
    # Do NOT strip symbols. The Go core (Postcards.xcframework, gomobile) is a static library
    # linked into the app, and Go's runtime relies on its symbols (runtime.morestack and the
    # rest) at runtime for GC stack scanning and stack growth. `xcodebuild archive` strips with
    # STRIP_STYLE=all by default, which removed those symbols in Release/TestFlight builds and
    # corrupted the Go heap — a crash that only ever appeared in CI/archived builds, never in
    # local Debug runs. Keeping symbols also means archived crash reports stay symbolicated.
    STRIP_INSTALLED_PRODUCT: NO
    # Declares the app uses no non-exempt encryption (only Apple's standard HTTPS), so
    # App Store Connect stops asking the export-compliance question on every TestFlight build.
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    ENABLE_USER_SCRIPT_SANDBOXING: true
    FRAMEWORK_SEARCH_PATHS:
      - "$(PROJECT_DIR)/Frameworks"
    DEVELOPMENT_TEAM: 7L3537S658

# The Postcard Collection format uses the single-segment ".postcards" extension, so it can
# be declared as a proper exported UTI (the app owns the type, giving a default handler,
# icon, and Files/iCloud association) instead of the previous compound-extension workaround.
#
# Both platforms share one ubiquity container (iCloud.org.dotpostcard.collector) so a
# collection dropped into Files/iCloud Drive on either platform syncs to the other.
# NSUbiquitousContainerIsDocumentScopePublic + SupportedFolderLevels=Any is what makes the
# "Postcards" folder show up under iCloud Drive in Files.app/Finder at all.
targetTemplates:
  PostcardApp:
    entitlements:
      path: Postcards/Support/Postcards.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.org.dotpostcard.collector
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.org.dotpostcard.collector
    info:
      path: Postcards/Support/Info-${target_name}.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: Postcard Collection
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - org.dotpostcard.postcards
          - CFBundleTypeName: Postcard
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - org.dotpostcard.postcard
          - CFBundleTypeName: Postcard Image
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.jpeg
              - public.png
              - org.webmproject.webp
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: org.dotpostcard.postcards
            UTTypeDescription: Postcard Collection
            UTTypeConformsTo:
              - public.database
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - postcards
          # Deliberately conforms to public.data only (NOT public.image) so the system
          # doesn't claim QuickLook previews/thumbnails for bare .postcard files — our own
          # QuickLook extension (a later phase) is meant to own that, not a generic image
          # viewer.
          - UTTypeIdentifier: org.dotpostcard.postcard
            UTTypeDescription: Postcard
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - postcard
        NSUbiquitousContainers:
          iCloud.org.dotpostcard.collector:
            NSUbiquitousContainerName: Postcards
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerSupportedFolderLevels: Any

targets:
  Postcards-iOS:
    templates: [PostcardApp]
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Postcards
        excludes:
          - "Support/**"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      TARGETED_DEVICE_FAMILY: "1,2"
      # The app declares document types but imports by copying files into its own container
      # (it doesn't edit them in place), so it opens documents out-of-place. Declaring this
      # explicitly clears App Store validation warning ITMS-90737.
      INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: NO
      # Per-target provisioning profile, set only for release signing (see release.yaml /
      # docs/RELEASING.md). Release passes the profile *name* per target via a user-defined
      # var (e.g. IOS_PROFILE_SPECIFIER=…) instead of a single global
      # PROVISIONING_PROFILE_SPECIFIER on the xcodebuild CLI — a global one would be forced
      # onto the embedded watch app (org.dotpostcard.collector.watchkitapp), whose bundle id
      # it doesn't match. Expands to empty (harmless) for CODE_SIGNING_ALLOWED=NO / automatic
      # dev builds.
      PROVISIONING_PROFILE_SPECIFIER: $(IOS_PROFILE_SPECIFIER)
    dependencies:
      # gomobile emits a STATIC library packaged as a .framework, so it must be linked, not
      # embedded/code-signed as if it were a dynamic framework. Embedding it made the archive
      # produce a broken 84KB dynamic-stub in Frameworks/ and mis-handle the statically-linked
      # Go code under optimization. `embed: false` links the static lib cleanly into the app.
      - framework: Frameworks/Postcards.xcframework
        embed: false
      # Linked explicitly for CollectionReader.swift's `import SQLite3` — the SDK module
      # doesn't get its symbols linked automatically.
      - sdk: libsqlite3.tbd
      - target: Postcards-watchOS
        embed: true

  Postcards-macOS:
    templates: [PostcardApp]
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Postcards
        excludes:
          - "Support/**"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector.mac
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_NSHumanReadableCopyright: ""
      COMBINE_HIDPI_IMAGES: true
      ENABLE_HARDENED_RUNTIME: true
      # Scoped to this target only (see the IOS_PROFILE_SPECIFIER note above). The bundled
      # QuickLook appexes are sandboxed but carry no restricted entitlement, so they sign
      # with the Developer ID identity and NO profile — a global specifier would wrongly try
      # to apply this app's profile to them.
      PROVISIONING_PROFILE_SPECIFIER: $(MACOS_PROFILE_SPECIFIER)
    dependencies:
      # gomobile emits a STATIC library packaged as a .framework, so it must be linked, not
      # embedded/code-signed as if it were a dynamic framework. Embedding it made the archive
      # produce a broken 84KB dynamic-stub in Frameworks/ and mis-handle the statically-linked
      # Go code under optimization. `embed: false` links the static lib cleanly into the app.
      - framework: Frameworks/Postcards.xcframework
        embed: false
      - sdk: libsqlite3.tbd
      - target: PostcardsQuickLookPreview
        embed: true
      - target: PostcardsQuickLookThumbnail
        embed: true

  Postcards-watchOS:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchApp
      - path: Postcards/Core/Models.swift
      - path: Postcards/Core/FlipGeometry.swift
      - path: Postcards/Core/CardFileXMP.swift
      - path: Postcards/Core/LibrarySource.swift
      - path: Postcards/Core/PinStore.swift
      - path: Postcards/Core/WatchRelay.swift
      - path: Postcards/Core/WatchCacheLayout.swift
      - path: Postcards/Core/WatchDecodedFaceCache.swift
      - path: Postcards/Core/ZoomGeometry.swift
      - path: Postcards/Motion/ParallaxGeometry.swift
      - path: Postcards/Motion/ParallaxModel.swift
      - path: Postcards/Views/FlipEffect.swift
    # No iCloud/ubiquity entitlements: the watch never touches iCloud directly (watchOS can't
    # open iCloud Drive documents). It receives collections from the iPhone over
    # WatchConnectivity, which needs no entitlement — see WatchLibrary / WatchConnectivityProvider.
    entitlements:
      path: WatchApp/Postcards-watchOS.entitlements
      properties: {}
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector.watchkitapp
      INFOPLIST_KEY_WKApplication: true
      INFOPLIST_KEY_WKCompanionAppBundleIdentifier: org.dotpostcard.collector
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      # Still needs its own App Store profile at release for the embedded watch app, but with
      # no restricted capabilities now (no iCloud) — see docs/RELEASING.md.
      PROVISIONING_PROFILE_SPECIFIER: $(WATCH_PROFILE_SPECIFIER)
    dependencies:
      - sdk: libsqlite3.tbd

  PostcardsQuickLookPreview:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Extensions/QuickLookPreview
      - path: Postcards/Core/Models.swift
      - path: Postcards/Core/FlipGeometry.swift
      - path: Postcards/Core/ImageSplitter.swift
      - path: Postcards/Core/CollectionReader.swift
      - path: Postcards/Core/CardFileXMP.swift
      - path: Postcards/Core/MasonryLayout.swift
      - path: Postcards/Motion/ParallaxGeometry.swift
      - path: Postcards/Motion/ParallaxModel.swift
      - path: Postcards/Views/FlipEffect.swift
      - path: Postcards/Views/MasonryGrid.swift
    entitlements:
      path: Extensions/QuickLookPreview/QuickLookPreview.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
    info:
      path: Extensions/QuickLookPreview/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PreviewViewController
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - org.dotpostcard.postcard
              - org.dotpostcard.postcards
            QLIsDataBasedPreview: false
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector.mac.preview
      ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - sdk: libsqlite3.tbd

  PostcardsQuickLookThumbnail:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Extensions/QuickLookThumbnail
      - path: Postcards/Core/Models.swift
      - path: Postcards/Core/FlipGeometry.swift
      - path: Postcards/Core/ImageSplitter.swift
      - path: Postcards/Core/CollectionReader.swift
      - path: Postcards/Core/CardFileXMP.swift
    entitlements:
      path: Extensions/QuickLookThumbnail/QuickLookThumbnail.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
    info:
      path: Extensions/QuickLookThumbnail/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.thumbnail
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ThumbnailProvider
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - org.dotpostcard.postcard
              - org.dotpostcard.postcards
            QLThumbnailMinimumDimension: 0
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector.mac.thumbnail
      ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - sdk: libsqlite3.tbd

  PostcardsTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Postcards/Core
      - path: Postcards/Motion
      - path: PostcardsTests
        excludes:
          - "Resources/**"
      - path: PostcardsTests/Resources
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector.tests
      GENERATE_INFOPLIST_FILE: true
    dependencies:
      # gomobile emits a STATIC library packaged as a .framework, so it must be linked, not
      # embedded/code-signed as if it were a dynamic framework. Embedding it made the archive
      # produce a broken 84KB dynamic-stub in Frameworks/ and mis-handle the statically-linked
      # Go code under optimization. `embed: false` links the static lib cleanly into the app.
      - framework: Frameworks/Postcards.xcframework
        embed: false
      - sdk: libsqlite3.tbd

  PostcardsUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PostcardsUITests
        excludes:
          - "Resources/**"
      - path: PostcardsUITests/Resources
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.dotpostcard.collector.uitests
      TEST_TARGET_NAME: Postcards-iOS
    dependencies:
      - target: Postcards-iOS

schemes:
  Postcards-iOS:
    build:
      targets:
        Postcards-iOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PostcardsUITests
  Postcards-macOS:
    build:
      targets:
        Postcards-macOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PostcardsTests
  PostcardsTests:
    build:
      targets:
        PostcardsTests: all
    test:
      config: Debug
      targets:
        - PostcardsTests
