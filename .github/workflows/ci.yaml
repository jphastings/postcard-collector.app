name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Pinned release tag of jphastings/dotpostcard that provides Postcards.xcframework.
  # Bump to a newer tag when picking up framework changes (see docs/RELEASING.md).
  DOTPOSTCARD_REF: v0.21.1

jobs:
  core:
    name: Build Postcards.xcframework
    runs-on: macos-15
    steps:
      - name: Checkout dotpostcard
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: jphastings/dotpostcard
          ref: ${{ env.DOTPOSTCARD_REF }}
          path: dotpostcard

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: dotpostcard/go.mod
          cache-dependency-path: dotpostcard/go.sum

      # Bind is ~10min of cgo compilation across 3 targets; skip it entirely when
      # this exact dotpostcard ref has already been built by a previous run.
      - name: Cache built XCFramework
        id: cache-xcframework
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: dotpostcard/build/Postcards.xcframework
          key: xcframework-${{ env.DOTPOSTCARD_REF }}

      - name: gomobile init
        if: steps.cache-xcframework.outputs.cache-hit != 'true'
        working-directory: dotpostcard
        run: go run golang.org/x/mobile/cmd/gomobile init

      - name: Build XCFramework
        if: steps.cache-xcframework.outputs.cache-hit != 'true'
        working-directory: dotpostcard
        run: make xcframework

      - name: Upload XCFramework
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Postcards.xcframework
          path: dotpostcard/build/Postcards.xcframework
          retention-days: 1

  app:
    name: Build & test app
    needs: core
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download XCFramework
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Postcards.xcframework
          path: Frameworks/Postcards.xcframework

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build macOS
        run: |
          set -o pipefail
          xcodebuild -project Postcards.xcodeproj -scheme Postcards-macOS \
            -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO \
            build | tee build-macos.log

      - name: Build iOS (Simulator)
        run: |
          set -o pipefail
          xcodebuild -project Postcards.xcodeproj -scheme Postcards-iOS \
            -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO \
            build | tee build-ios.log

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild -project Postcards.xcodeproj -scheme PostcardsTests \
            -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO \
            test | tee test.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-and-test-logs
          path: |
            build-macos.log
            build-ios.log
            test.log
