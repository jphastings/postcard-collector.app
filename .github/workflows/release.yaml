name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # Keep in sync with ci.yaml — see the comment there for the bump procedure.
  DOTPOSTCARD_REF: v0.23.0
  DEVELOPMENT_TEAM: 7L3537S658

jobs:
  core:
    name: Build Postcards.xcframework
    runs-on: macos-15
    steps:
      - name: Checkout dotpostcard
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: jphastings/dotpostcard
          ref: ${{ env.DOTPOSTCARD_REF }}
          path: dotpostcard

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: dotpostcard/go.mod
          cache-dependency-path: dotpostcard/go.sum

      - name: Cache built XCFramework
        id: cache-xcframework
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: dotpostcard/build/Postcards.xcframework
          key: xcframework-${{ env.DOTPOSTCARD_REF }}

      - name: gomobile init
        if: steps.cache-xcframework.outputs.cache-hit != 'true'
        working-directory: dotpostcard
        run: go run golang.org/x/mobile/cmd/gomobile init

      - name: Build XCFramework
        if: steps.cache-xcframework.outputs.cache-hit != 'true'
        working-directory: dotpostcard
        run: make xcframework

      - name: Archive XCFramework
        # actions/upload-artifact doesn't preserve the framework's internal
        # Versions/Current symlinks, which silently corrupts the bundle for
        # codesign on the other side — tar it instead of uploading the raw tree.
        run: tar -czf Postcards.xcframework.tar.gz -C dotpostcard/build Postcards.xcframework

      - name: Upload XCFramework
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Postcards.xcframework
          path: Postcards.xcframework.tar.gz
          retention-days: 1

  build-macos:
    name: Archive macOS app
    needs: core
    runs-on: macos-26
    # secrets.* can't be used directly in `if:` — mirroring them into job-level env
    # vars makes them visible to `if:` on every step below (they're '' when unset).
    env:
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
      NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
      NOTARY_KEY_BASE64: ${{ secrets.NOTARY_KEY_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download XCFramework
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Postcards.xcframework

      - name: Extract XCFramework
        run: |
          mkdir -p Frameworks
          tar -xzf Postcards.xcframework.tar.gz -C Frameworks

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate & provisioning profile
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.MACOS_PROVISIONING_PROFILE_BASE64 != '' }}
        id: import-macos-signing
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/macos-signing.keychain-db"
          PROFILE_PATH="$RUNNER_TEMP/macos.provisionprofile"
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$MACOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$PROFILES_DIR"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/macos-profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/macos-profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/macos-profile.plist")
          cp "$PROFILE_PATH" "$PROFILES_DIR/$PROFILE_UUID.provisionprofile"

          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Archive (signed)
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.MACOS_PROVISIONING_PROFILE_BASE64 != '' }}
        run: |
          # Scope the profile to the app target via the target's own
          # PROVISIONING_PROFILE_SPECIFIER=$(MACOS_PROFILE_SPECIFIER) setting (see project.yml)
          # rather than a global PROVISIONING_PROFILE_SPECIFIER, which would be forced onto the
          # embedded QuickLook appexes too. The sandboxed appexes carry no restricted
          # entitlement, so they sign with the Developer ID identity and no profile.
          xcodebuild archive -project Postcards.xcodeproj -scheme Postcards-macOS \
            -archivePath build/Postcards-macOS.xcarchive \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            MACOS_PROFILE_SPECIFIER="${{ steps.import-macos-signing.outputs.profile_name }}"

          PLIST="$RUNNER_TEMP/ExportOptions-macOS.plist"
          plutil -create xml1 "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :method string developer-id" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :teamID string $DEVELOPMENT_TEAM" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :signingCertificate string Developer ID Application" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:org.dotpostcard.collector.mac string ${{ steps.import-macos-signing.outputs.profile_name }}" "$PLIST"

          xcodebuild -exportArchive -archivePath build/Postcards-macOS.xcarchive \
            -exportPath build/export-macos -exportOptionsPlist "$PLIST"

      - name: Archive (unsigned)
        if: ${{ env.BUILD_CERTIFICATE_BASE64 == '' || env.MACOS_PROVISIONING_PROFILE_BASE64 == '' }}
        run: |
          xcodebuild archive -project Postcards.xcodeproj -scheme Postcards-macOS \
            -archivePath build/Postcards-macOS.xcarchive \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p build/export-macos
          # PRODUCT_NAME is $(TARGET_NAME) in project.yml, so the built bundle is Postcards-macOS.app.
          cp -R build/Postcards-macOS.xcarchive/Products/Applications/Postcards-macOS.app build/export-macos/

      - name: Notarize & staple
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.MACOS_PROVISIONING_PROFILE_BASE64 != '' && env.NOTARY_KEY_ID != '' }}
        run: |
          KEY_PATH="$RUNNER_TEMP/notary_key.p8"
          echo -n "$NOTARY_KEY_BASE64" | base64 --decode -o "$KEY_PATH"

          ditto -c -k --keepParent build/export-macos/Postcards-macOS.app build/Postcards-notarize.zip

          xcrun notarytool submit build/Postcards-notarize.zip \
            --key "$KEY_PATH" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" --wait

          xcrun stapler staple build/export-macos/Postcards-macOS.app

      - name: Zip app
        run: |
          mkdir -p dist
          ditto -c -k --keepParent build/export-macos/Postcards-macOS.app dist/Postcards-macOS.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Postcards-macOS
          path: dist/Postcards-macOS.zip

      - name: Delete temporary keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/macos-signing.keychain-db" 2>/dev/null || true

  build-ios:
    name: Archive iOS app
    needs: core
    runs-on: macos-26
    env:
      IOS_DIST_CERTIFICATE_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      # The embedded watch app has its own App ID (distinct bundle id), so it needs its own
      # App Store profile; the signed iOS archive can't be built without it. (It no longer
      # carries an iCloud entitlement — the watch talks to the phone over WatchConnectivity.)
      WATCH_PROVISIONING_PROFILE_BASE64: ${{ secrets.WATCH_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download XCFramework
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Postcards.xcframework

      - name: Extract XCFramework
        run: |
          mkdir -p Frameworks
          tar -xzf Postcards.xcframework.tar.gz -C Frameworks

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate, provisioning profiles & App Store Connect key
        if: ${{ env.IOS_DIST_CERTIFICATE_BASE64 != '' && env.IOS_PROVISIONING_PROFILE_BASE64 != '' && env.WATCH_PROVISIONING_PROFILE_BASE64 != '' && env.ASC_KEY_ID != '' }}
        id: import-ios-signing
        run: |
          CERT_PATH="$RUNNER_TEMP/ios_distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-signing.keychain-db"
          PROFILE_PATH="$RUNNER_TEMP/ios.mobileprovision"
          WATCH_PROFILE_PATH="$RUNNER_TEMP/watch.mobileprovision"
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          echo -n "$IOS_DIST_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          echo -n "$WATCH_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$WATCH_PROFILE_PATH"
          echo -n "$ASC_KEY_BASE64" | base64 --decode -o "$RUNNER_TEMP/AuthKey_$ASC_KEY_ID.p8"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$PROFILES_DIR"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/ios-profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/ios-profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/ios-profile.plist")
          cp "$PROFILE_PATH" "$PROFILES_DIR/$PROFILE_UUID.mobileprovision"

          # The embedded watch app (org.dotpostcard.collector.watchkitapp) needs its own App
          # Store profile — a global specifier can't cover two bundle ids in one archive.
          security cms -D -i "$WATCH_PROFILE_PATH" > "$RUNNER_TEMP/watch-profile.plist"
          WATCH_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/watch-profile.plist")
          WATCH_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/watch-profile.plist")
          cp "$WATCH_PROFILE_PATH" "$PROFILES_DIR/$WATCH_PROFILE_UUID.mobileprovision"

          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"
          echo "watch_profile_name=$WATCH_PROFILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Archive (signed)
        if: ${{ env.IOS_DIST_CERTIFICATE_BASE64 != '' && env.IOS_PROVISIONING_PROFILE_BASE64 != '' && env.WATCH_PROVISIONING_PROFILE_BASE64 != '' && env.ASC_KEY_ID != '' }}
        run: |
          # Per-target profile names via the targets' PROVISIONING_PROFILE_SPECIFIER=$(…) vars
          # (see project.yml): the iOS app and the embedded watch app have distinct bundle ids
          # and need distinct profiles, which a single global specifier can't express.
          xcodebuild archive -project Postcards.xcodeproj -scheme Postcards-iOS \
            -archivePath build/Postcards-iOS.xcarchive -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            IOS_PROFILE_SPECIFIER="${{ steps.import-ios-signing.outputs.profile_name }}" \
            WATCH_PROFILE_SPECIFIER="${{ steps.import-ios-signing.outputs.watch_profile_name }}"

      - name: Upload to TestFlight
        if: ${{ env.IOS_DIST_CERTIFICATE_BASE64 != '' && env.IOS_PROVISIONING_PROFILE_BASE64 != '' && env.WATCH_PROVISIONING_PROFILE_BASE64 != '' && env.ASC_KEY_ID != '' }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_$ASC_KEY_ID.p8"

          PLIST="$RUNNER_TEMP/ExportOptions-iOS-testflight.plist"
          plutil -create xml1 "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" "$PLIST"
          # destination "upload" sends the build straight to App Store Connect
          # (TestFlight) instead of writing an .ipa to -exportPath.
          /usr/libexec/PlistBuddy -c "Add :destination string upload" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :teamID string $DEVELOPMENT_TEAM" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:org.dotpostcard.collector string ${{ steps.import-ios-signing.outputs.profile_name }}" "$PLIST"
          # The embedded watch app is signed with its own profile during export too.
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:org.dotpostcard.collector.watchkitapp string ${{ steps.import-ios-signing.outputs.watch_profile_name }}" "$PLIST"

          # The API key here is only the upload transport credential — signing stays
          # manual via the installed profile.
          xcodebuild -exportArchive -archivePath build/Postcards-iOS.xcarchive \
            -exportPath build/export-ios -exportOptionsPlist "$PLIST" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          echo "Uploaded Postcards-iOS ${GITHUB_REF_NAME} to TestFlight (App Store Connect, key $ASC_KEY_ID). No .ipa artifact is attached to the GitHub Release for this path." >> "$GITHUB_STEP_SUMMARY"

      - name: Build (unsigned, simulator)
        if: ${{ env.IOS_DIST_CERTIFICATE_BASE64 == '' || env.IOS_PROVISIONING_PROFILE_BASE64 == '' || env.WATCH_PROVISIONING_PROFILE_BASE64 == '' || env.ASC_KEY_ID == '' }}
        run: |
          xcodebuild -project Postcards.xcodeproj -scheme Postcards-iOS \
            -destination 'generic/platform=iOS Simulator' -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO build

          mkdir -p dist build/export-ios
          # PRODUCT_NAME is $(TARGET_NAME), so the built bundle is Postcards-iOS.app, one
          # level below Products (e.g. Products/Debug-iphonesimulator/Postcards-iOS.app).
          APP_PATH=$(find build/derived/Build/Products -mindepth 2 -maxdepth 2 -name 'Postcards-iOS.app' -print -quit)
          cp -R "$APP_PATH" build/export-ios/
          ditto -c -k --keepParent "build/export-ios/$(basename "$APP_PATH")" dist/Postcards-iOS-simulator.zip

      - name: Upload iOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Postcards-iOS
          # Only the unsigned fallback produces a file; the signed path uploads to
          # TestFlight instead of writing an .ipa.
          path: dist/Postcards-iOS-simulator.zip
          if-no-files-found: ignore

      - name: Delete temporary keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/ios-signing.keychain-db" 2>/dev/null || true

  release:
    name: Publish GitHub Release
    needs: [build-macos, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: "Postcards-*" # excludes the intermediate Postcards.xcframework artifact
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*
          generate_release_notes: true
